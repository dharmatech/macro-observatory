name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_cold_build:
        description: "Allow full API cold build if no data/cache Actions cache is restored"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Restore data cache
        id: data-cache-restore
        uses: actions/cache/restore@v6.1.0
        with:
          path: data/cache
          key: macro-observatory-data-cache-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            macro-observatory-data-cache-v1-${{ runner.os }}-

      - name: Report data cache restore
        run: |
          echo "EVENT_NAME=${{ github.event_name }}"
          echo "CACHE_HIT=${{ steps.data-cache-restore.outputs.cache-hit }}"
          echo "CACHE_PRIMARY_KEY=${{ steps.data-cache-restore.outputs.cache-primary-key }}"
          echo "CACHE_MATCHED_KEY=${{ steps.data-cache-restore.outputs.cache-matched-key }}"
          echo "ALLOW_COLD_BUILD=${{ github.event.inputs.allow_cold_build }}"
          if [ -d data/cache ]; then
            du -sh data/cache
          else
            echo "data/cache is not present before build"
          fi

      - name: Refuse accidental cold build
        if: ${{ steps.data-cache-restore.outputs.cache-hit == '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.allow_cold_build != 'true') }}
        run: |
          echo "::error::No Actions data cache was restored. Refusing cold API build. Rerun manually with allow_cold_build=true only if this is an intentional bootstrap or repair run."
          exit 1

      - name: Warn about intentional cold build
        if: ${{ steps.data-cache-restore.outputs.cache-hit == '' && github.event_name == 'workflow_dispatch' && github.event.inputs.allow_cold_build == 'true' }}
        run: |
          echo "::warning::No Actions data cache was restored. allow_cold_build=true, so this run will cold-build source data from APIs and save the first data/cache snapshot."

      - name: Validate required secrets
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "::error::FRED_API_KEY repository secret is required for source-data updates."
            exit 1
          fi

      - name: Build site data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          start=$(date +%s)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build-site mode: from-cache"
            uv run macro-observatory build-site --from-cache
          else
            echo "build-site mode: update-sources"
            uv run macro-observatory build-site --require-fred-api-key
          fi
          end=$(date +%s)
          echo "build-site duration: $((end - start)) seconds"
          echo "data/cache size after build:"
          du -sh data/cache

      - name: Show storage report
        run: uv run macro-observatory storage-report

      - name: Save data cache
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/cache/save@v6.1.0
        with:
          path: data/cache
          key: ${{ steps.data-cache-restore.outputs.cache-primary-key }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
